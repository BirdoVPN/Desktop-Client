name: Build Linux Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string
  push:
    tags:
      - 'linux-v*'

# Minimum permissions — each job declares its own
permissions: {}

concurrency:
  group: build-linux-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  XRAY_VERSION: v26.2.6
  # SHA2-256 of the official Xray-core v26.2.6 Linux x86_64 release zip
  # (from Xray-linux-64.zip.dgst). Mirrors the Windows pipeline's pin.
  XRAY_LINUX_SHA256: 29ce535b56e207a406ffa1c2d4842dcc410be003eff8ec508bb732abc9f8e385

jobs:
  build-linux:
    strategy:
      matrix:
        include:
          - runner: ubuntu-22.04
            arch: x86_64-unknown-linux-gnu
            label: amd64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
      id-token: write  # Required for Sigstore keyless signing
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: ${{ matrix.arch }}

      - name: Rust cache
        uses: Swatinem/rust-cache@401aff9a7a08acb9d27b64936a90db81024cff97 # v2.8.2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Prepare resources directory
        run: |
          mkdir -p src-tauri/resources
          touch src-tauri/resources/.gitkeep

      # Download + SHA-verify + bundle the pinned Xray Reality engine, mirroring
      # the Windows pipeline. Without this the release fails closed: xray.rs
      # refuses to exec an unverified binary and XRAY_BINARY_SHA256 stays unset.
      - name: Download pinned Xray Reality engine
        run: |
          set -euo pipefail
          XRAY_URL="https://github.com/XTLS/Xray-core/releases/download/${XRAY_VERSION}/Xray-linux-64.zip"
          ZIP_PATH="${RUNNER_TEMP}/xray-linux-64.zip"
          curl -fsSL "$XRAY_URL" -o "$ZIP_PATH"
          ACTUAL=$(sha256sum "$ZIP_PATH" | awk '{print $1}')
          if [ "$ACTUAL" != "$XRAY_LINUX_SHA256" ]; then
            echo "::error::Xray zip SHA256 mismatch. Expected $XRAY_LINUX_SHA256, got $ACTUAL"
            exit 1
          fi
          unzip -o "$ZIP_PATH" -d "${RUNNER_TEMP}/xray"
          install -m 0755 "${RUNNER_TEMP}/xray/xray" src-tauri/resources/xray
          BINARY_SHA=$(sha256sum src-tauri/resources/xray | awk '{print $1}')
          echo "XRAY_BINARY_SHA256=$BINARY_SHA" >> "$GITHUB_ENV"
          echo "Xray ready: src-tauri/resources/xray ($BINARY_SHA)"

      - name: Build Tauri application
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # CD-2: inject Sentry DSN so option_env!("SENTRY_DSN") is Some(..) in
          # the shipped binary (owner sets the SENTRY_DSN repo secret).
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          # CD-3: SHA of the bundled xray binary, verified at runtime by xray.rs.
          XRAY_BINARY_SHA256: ${{ env.XRAY_BINARY_SHA256 }}
        run: npx tauri build --target ${{ matrix.arch }}

      # ── Sigstore keyless signing ──────────────────────────────────────
      - name: Install Cosign
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0

      - name: Sign .deb with Sigstore
        run: |
          DEB_FILE=$(find src-tauri/target/${{ matrix.arch }}/release/bundle/deb -name '*.deb' | head -1)
          if [ -n "$DEB_FILE" ]; then
            cosign sign-blob --yes --bundle "${DEB_FILE}.sigstore" "$DEB_FILE"
            echo "Signed $(basename $DEB_FILE)"
          else
            echo "::warning::DEB not found"
          fi

      - name: Sign AppImage with Sigstore
        run: |
          APPIMAGE_FILE=$(find src-tauri/target/${{ matrix.arch }}/release/bundle/appimage -name '*.AppImage' | head -1)
          if [ -n "$APPIMAGE_FILE" ]; then
            cosign sign-blob --yes --bundle "${APPIMAGE_FILE}.sigstore" "$APPIMAGE_FILE"
            echo "Signed $(basename $APPIMAGE_FILE)"
          else
            echo "::warning::AppImage not found"
          fi

      - name: Generate SHA256 checksums
        run: |
          cd src-tauri/target/${{ matrix.arch }}/release/bundle
          find . -type f \( -name '*.deb' -o -name '*.AppImage' \) | while read f; do
            sha256sum "$f" >> SHA256SUMS.txt
          done
          cat SHA256SUMS.txt || echo "No artifacts to checksum"

      - name: Sign checksums with Sigstore
        run: |
          SUMS="src-tauri/target/${{ matrix.arch }}/release/bundle/SHA256SUMS.txt"
          if [ -f "$SUMS" ]; then
            cosign sign-blob --yes --bundle "${SUMS}.sigstore" "$SUMS"
          fi

      # ── GPG signing (detached .asc, classic Linux distribution model) ───
      # Required GitHub secrets (Settings → Secrets and variables → Actions):
      #   LINUX_GPG_PRIVATE_KEY       — ASCII-armoured private key block
      #   LINUX_GPG_PASSPHRASE        — passphrase for the private key
      #   LINUX_GPG_KEY_ID            — long key ID (e.g. ABCDEF0123456789)
      # The public key must be published at https://birdo.app/.well-known/birdo-release.asc
      # so users can verify with:  gpg --verify file.asc file
      - name: Detect GPG availability
        id: gpg-detect
        env:
          GPG_KEY: ${{ secrets.LINUX_GPG_PRIVATE_KEY }}
          GPG_KID: ${{ secrets.LINUX_GPG_KEY_ID }}
        run: |
          if [ -n "$GPG_KEY" ] && [ -n "$GPG_KID" ]; then
            echo "HAS_GPG=true"  >> "$GITHUB_ENV"
          else
            echo "HAS_GPG=false" >> "$GITHUB_ENV"
            echo "::warning::LINUX_GPG_PRIVATE_KEY / LINUX_GPG_KEY_ID not configured — skipping GPG signing"
          fi

      - name: Import GPG signing key
        if: ${{ env.HAS_GPG == 'true' }}
        uses: crazy-max/ghaction-import-gpg@e89d40939c28e39f97cf32126055eeae86ba74ec # v6.3.0
        with:
          gpg_private_key: ${{ secrets.LINUX_GPG_PRIVATE_KEY }}
          passphrase:      ${{ secrets.LINUX_GPG_PASSPHRASE }}

      - name: GPG-sign .deb (detached .asc)
        if: ${{ env.HAS_GPG == 'true' }}
        run: |
          DEB_FILE=$(find src-tauri/target/${{ matrix.arch }}/release/bundle/deb -name '*.deb' | head -1)
          if [ -n "$DEB_FILE" ]; then
            gpg --batch --yes --pinentry-mode loopback \
                --passphrase "${{ secrets.LINUX_GPG_PASSPHRASE }}" \
                --local-user "${{ secrets.LINUX_GPG_KEY_ID }}" \
                --armor --detach-sign --output "${DEB_FILE}.asc" "$DEB_FILE"
            echo "GPG-signed $(basename $DEB_FILE) → $(basename $DEB_FILE).asc"
          fi

      - name: GPG-sign AppImage (detached .asc)
        if: ${{ env.HAS_GPG == 'true' }}
        run: |
          APPIMAGE_FILE=$(find src-tauri/target/${{ matrix.arch }}/release/bundle/appimage -name '*.AppImage' | head -1)
          if [ -n "$APPIMAGE_FILE" ]; then
            gpg --batch --yes --pinentry-mode loopback \
                --passphrase "${{ secrets.LINUX_GPG_PASSPHRASE }}" \
                --local-user "${{ secrets.LINUX_GPG_KEY_ID }}" \
                --armor --detach-sign --output "${APPIMAGE_FILE}.asc" "$APPIMAGE_FILE"
            echo "GPG-signed $(basename $APPIMAGE_FILE) → $(basename $APPIMAGE_FILE).asc"
          fi

      - name: GPG-sign SHA256SUMS (detached .asc)
        if: ${{ env.HAS_GPG == 'true' }}
        run: |
          SUMS="src-tauri/target/${{ matrix.arch }}/release/bundle/SHA256SUMS.txt"
          if [ -f "$SUMS" ]; then
            gpg --batch --yes --pinentry-mode loopback \
                --passphrase "${{ secrets.LINUX_GPG_PASSPHRASE }}" \
                --local-user "${{ secrets.LINUX_GPG_KEY_ID }}" \
                --armor --detach-sign --output "${SUMS}.asc" "$SUMS"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: birdo-vpn-linux-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.arch }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.arch }}/release/bundle/deb/*.deb.asc
            src-tauri/target/${{ matrix.arch }}/release/bundle/deb/*.sigstore
            src-tauri/target/${{ matrix.arch }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.arch }}/release/bundle/appimage/*.AppImage.asc
            src-tauri/target/${{ matrix.arch }}/release/bundle/appimage/*.sigstore
            src-tauri/target/${{ matrix.arch }}/release/bundle/SHA256SUMS.txt
            src-tauri/target/${{ matrix.arch }}/release/bundle/SHA256SUMS.txt.asc
            src-tauri/target/${{ matrix.arch }}/release/bundle/SHA256SUMS.txt.sigstore
          retention-days: 30

  # ── GitHub Release ─────────────────────────────────────────────────
  release:
    needs: build-linux
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: birdo-vpn-linux-amd64
          path: release-files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          files: release-files/**/*
          generate_release_notes: true
          draft: true
