# Birdo VPN — Dependency Advisory Check
# Run: cargo deny check advisories
# Schedule: weekly (or on every PR)

name: Dependency Audit (cargo-deny)

on:
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 09:00 UTC
  pull_request:
    paths:
      - 'src-tauri/Cargo.toml'
      - 'src-tauri/Cargo.lock'
      - 'src-tauri/deny.toml'
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    # src-tauri lives at the repo root (the repo IS the desktop client), so the
    # working dir is just src-tauri — the old birdo-client-desktop/ prefix
    # pointed at a non-existent path and failed every scheduled run.
    working-directory: src-tauri

jobs:
  cargo-deny:
    runs-on: ubuntu-latest
    env:
      # cargo-deny never builds the app, but the `cargo metadata` it runs must
      # parse dependency manifests that use edition2024 (e.g. dlopen2_derive) —
      # which the repo's pinned rustc 1.83 (src-tauri/rust-toolchain.toml, kept
      # for the Windows build) cannot do. Run this advisory scan on the runner's
      # stable Rust; RUSTUP_TOOLCHAIN overrides the pinned toml for this job only.
      RUSTUP_TOOLCHAIN: stable
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Ensure a recent stable Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Install cargo-deny
        run: cargo install --locked cargo-deny

      - name: Check advisories
        run: cargo deny check advisories

      - name: Check licenses
        run: cargo deny check licenses

      - name: Check bans
        run: cargo deny check bans

      - name: Check sources
        run: cargo deny check sources
