# Birdo VPN — Dependency Advisory Check
# Run: cargo deny check advisories
# Schedule: weekly (or on every PR)

name: Dependency Audit (cargo-deny)

on:
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 09:00 UTC
  pull_request:
    paths:
      - 'src-tauri/Cargo.toml'
      - 'src-tauri/Cargo.lock'
      - 'src-tauri/deny.toml'
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    # src-tauri lives at the repo root (the repo IS the desktop client), so the
    # working dir is just src-tauri — the old birdo-client-desktop/ prefix
    # pointed at a non-existent path and failed every scheduled run.
    working-directory: src-tauri

jobs:
  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install cargo-deny
        # Pinned to the 0.14 line on purpose: it builds on the repo's pinned rustc
        # 1.83 (src-tauri/rust-toolchain.toml, kept for the Windows build) AND reads
        # this repo's v1 deny.toml schema. Newer cargo-deny (>=0.18) requires rustc
        # >=1.88 and a v2 deny.toml — adopt both together when the toolchain pin is
        # bumped for the Linux/Windows build.
        run: cargo install --locked cargo-deny --version "~0.14"

      - name: Check advisories
        run: cargo deny check advisories

      - name: Check licenses
        run: cargo deny check licenses

      - name: Check bans
        run: cargo deny check bans

      - name: Check sources
        run: cargo deny check sources
