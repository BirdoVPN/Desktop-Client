name: Build & Sign Windows Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string
  push:
    tags:
      - 'win-v*'

# Minimum permissions — each job declares its own
permissions: {}

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Job 1: Build + Authenticode-sign (inner .exe AND installers) ────
  # Uses Tauri 2's bundle.windows.signCommand so signtool runs on:
  #   1. The main birdo-vpn-desktop.exe BEFORE it's bundled
  #   2. The NSIS installer .exe
  #   3. The MSI
  # Result: post-install, the launched VPN .exe shows Birdo VPN as the
  # publisher (no "Unknown publisher" warning).
  #
  # Authentication: Azure OIDC federation. The Trusted Signing dlib
  # (azuresigntool / Trusted Signing Client tools) is invoked by signtool
  # via the "/dlib" parameter. dotnet tools install the dlib globally so
  # signtool can find it on PATH.
  build:
    runs-on: windows-latest
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
    permissions:
      contents: write
      id-token: write  # Required for both Sigstore Fulcio AND Azure OIDC
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Rust cache
        uses: Swatinem/rust-cache@401aff9a7a08acb9d27b64936a90db81024cff97 # v2.8.2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      # Download wintun.dll (gitignored — must be fetched at build time)
      - name: Download Wintun
        shell: pwsh
        run: |
          $wintunUrl = "https://www.wintun.net/builds/wintun-0.14.1.zip"
          $zipPath = "$env:RUNNER_TEMP\wintun.zip"
          Invoke-WebRequest -Uri $wintunUrl -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath "$env:RUNNER_TEMP\wintun"
          # Copy to resources/ for Tauri bundling
          New-Item -ItemType Directory -Force -Path "src-tauri/resources"
          Copy-Item "$env:RUNNER_TEMP\wintun\wintun\bin\amd64\wintun.dll" "src-tauri/resources/wintun.dll"
          # Also copy to wintun-extract for build.rs
          New-Item -ItemType Directory -Force -Path "src-tauri/wintun-extract/wintun/bin/amd64"
          Copy-Item "$env:RUNNER_TEMP\wintun\wintun\bin\amd64\wintun.dll" "src-tauri/wintun-extract/wintun/bin/amd64/wintun.dll"
          Write-Host "Wintun DLL ready ($(Get-Item src-tauri/resources/wintun.dll | Select-Object -ExpandProperty Length) bytes)"

      # ── Authenticode signing setup (only on tag builds) ──────────────
      # Skip for PR/dispatch builds — those produce unsigned binaries that
      # are still Sigstore-signed. Only tagged releases get Authenticode.
      - name: Determine if this build should be Authenticode-signed
        id: sign-mode
        shell: pwsh
        run: |
          if ("${{ github.ref }}".StartsWith("refs/tags/")) {
            "enabled=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "Tag build — Authenticode signing ENABLED"
          } else {
            "enabled=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "Non-tag build — Authenticode signing DISABLED (Sigstore only)"
          }

      - name: Azure Login (OIDC) for Trusted Signing
        if: steps.sign-mode.outputs.enabled == 'true'
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          allow-no-subscriptions: true

      # Install Microsoft.Trusted.Signing.Client (provides Azure.CodeSigning.Dlib.dll
      # which signtool.exe loads via the /dlib parameter to talk to Trusted Signing).
      - name: Install Trusted Signing Client tools
        if: steps.sign-mode.outputs.enabled == 'true'
        shell: pwsh
        run: |
          $pkgDir = "$env:RUNNER_TEMP\trusted-signing"
          New-Item -ItemType Directory -Force -Path $pkgDir | Out-Null
          # Pull the Microsoft.Trusted.Signing.Client NuGet package
          nuget install Microsoft.Trusted.Signing.Client -Version 1.0.95 -OutputDirectory $pkgDir -ExcludeVersion
          $dlibPath = Get-ChildItem -Path $pkgDir -Recurse -Filter "Azure.CodeSigning.Dlib.dll" |
                      Where-Object { $_.FullName -match "x64" } |
                      Select-Object -First 1 -ExpandProperty FullName
          if (-not $dlibPath) { throw "Azure.CodeSigning.Dlib.dll (x64) not found" }
          "TRUSTED_SIGNING_DLIB=$dlibPath" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Dlib at: $dlibPath"

      # Write the signing metadata JSON that the dlib reads at sign time.
      - name: Write Trusted Signing metadata
        if: steps.sign-mode.outputs.enabled == 'true'
        shell: pwsh
        run: |
          $metadata = @{
            Endpoint = "${{ vars.AZURE_TRUSTED_SIGNING_ENDPOINT }}"
            CodeSigningAccountName = "${{ vars.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}"
            CertificateProfileName = "${{ vars.AZURE_TRUSTED_SIGNING_CERT_PROFILE }}"
            ExcludeCredentials = @(
              "ManagedIdentityCredential",
              "EnvironmentCredential",
              "WorkloadIdentityCredential",
              "SharedTokenCacheCredential",
              "VisualStudioCredential",
              "VisualStudioCodeCredential",
              "AzurePowerShellCredential",
              "AzureDeveloperCliCredential",
              "InteractiveBrowserCredential"
            )
          }
          $metadataPath = "$env:RUNNER_TEMP\trusted-signing-metadata.json"
          $metadata | ConvertTo-Json | Out-File -FilePath $metadataPath -Encoding utf8
          "TRUSTED_SIGNING_METADATA=$metadataPath" | Out-File -FilePath $env:GITHUB_ENV -Append

      # Inject signCommand into tauri.conf.json so Tauri signs every
      # signable artifact (main .exe BEFORE bundling, then NSIS, then MSI).
      # IMPORTANT: Tauri spawns the signCommand directly (no shell), so
      # `signtool` must be referenced by its absolute path. The Windows SDK
      # bin dir is NOT on the default PATH for child processes.
      - name: Inject Tauri signCommand for Authenticode
        if: steps.sign-mode.outputs.enabled == 'true'
        shell: pwsh
        run: |
          # Locate signtool.exe (Windows 10 SDK x64)
          $sdkRoot = "C:\Program Files (x86)\Windows Kits\10\bin"
          $signtool = Get-ChildItem -Path $sdkRoot -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
                      Where-Object { $_.FullName -match '\\x64\\' } |
                      Sort-Object { [version]($_.Directory.Parent.Name) } -Descending |
                      Select-Object -First 1 -ExpandProperty FullName
          if (-not $signtool) { throw "signtool.exe (x64) not found under $sdkRoot" }
          Write-Host "Using signtool: $signtool"

          $confPath = "src-tauri/tauri.conf.json"
          $conf = Get-Content $confPath -Raw | ConvertFrom-Json
          # Tauri parses the string as `program args...` and substitutes %1.
          # Quote every path that may contain spaces.
          $signCmd = '"' + $signtool + '"' +
                     ' sign /v /debug /fd SHA256' +
                     ' /tr http://timestamp.acs.microsoft.com /td SHA256' +
                     ' /dlib "' + $env:TRUSTED_SIGNING_DLIB + '"' +
                     ' /dmdf "' + $env:TRUSTED_SIGNING_METADATA + '"' +
                     ' %1'
          if (-not $conf.bundle.windows) { $conf.bundle | Add-Member -NotePropertyName windows -NotePropertyValue ([pscustomobject]@{}) -Force }
          $conf.bundle.windows | Add-Member -NotePropertyName signCommand -NotePropertyValue $signCmd -Force
          $conf | ConvertTo-Json -Depth 32 | Out-File -FilePath $confPath -Encoding utf8
          Write-Host "Injected signCommand into $confPath"
          Get-Content $confPath | Select-String -Pattern 'signCommand' -Context 0,1

      - name: Build Tauri application
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build

      # Sanity-check: confirm the unbundled main .exe AND the installers
      # carry an Authenticode signature. Fails the build loudly if any
      # artifact is unsigned, so we never ship "Unknown publisher" again.
      - name: Verify Authenticode signatures
        if: steps.sign-mode.outputs.enabled == 'true'
        shell: pwsh
        run: |
          $files = @()
          $files += Get-ChildItem "src-tauri/target/release/birdo-vpn-desktop.exe" -ErrorAction SilentlyContinue
          $files += Get-ChildItem "src-tauri/target/release/bundle/nsis/*.exe" -ErrorAction SilentlyContinue
          $files += Get-ChildItem "src-tauri/target/release/bundle/msi/*.msi" -ErrorAction SilentlyContinue
          if ($files.Count -eq 0) { throw "No artifacts found to verify" }
          $failed = $false
          foreach ($f in $files) {
            $sig = Get-AuthenticodeSignature -FilePath $f.FullName
            if ($sig.Status -ne 'Valid') {
              Write-Error "UNSIGNED or INVALID: $($f.Name) (status=$($sig.Status))"
              $failed = $true
            } else {
              Write-Host "OK: $($f.Name) signed by $($sig.SignerCertificate.Subject)"
            }
          }
          if ($failed) { throw "One or more artifacts are not properly signed" }

      # ── Sigstore keyless signing ──────────────────────────────────────
      # Provenance layer — proves GitHub Actions built this artifact.
      # Each artifact gets a .sigstore bundle (Fulcio cert + Rekor log).
      # Users verify with: cosign verify-blob --bundle <file>.sigstore <file>
      - name: Install Cosign
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0

      - name: Sign NSIS installer with Sigstore
        shell: pwsh
        run: |
          $nsisExe = Get-ChildItem "src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -First 1
          if ($nsisExe) {
            cosign sign-blob --yes --bundle "$($nsisExe.FullName).sigstore" $nsisExe.FullName
            Write-Host "Signed $($nsisExe.Name) → $($nsisExe.Name).sigstore"
          } else {
            Write-Error "NSIS installer not found"
            exit 1
          }

      - name: Sign MSI installer with Sigstore
        shell: pwsh
        run: |
          $msiFile = Get-ChildItem "src-tauri/target/release/bundle/msi/*.msi" | Select-Object -First 1
          if ($msiFile) {
            cosign sign-blob --yes --bundle "$($msiFile.FullName).sigstore" $msiFile.FullName
            Write-Host "Signed $($msiFile.Name) → $($msiFile.Name).sigstore"
          } else {
            Write-Error "MSI installer not found"
            exit 1
          }

      - name: Generate SHA256 checksums
        shell: pwsh
        run: |
          $artifacts = Get-ChildItem "src-tauri/target/release/bundle" -Recurse -Include *.exe, *.msi
          $checksums = @()
          foreach ($file in $artifacts) {
            $hash = (Get-FileHash -Path $file.FullName -Algorithm SHA256).Hash.ToLower()
            $checksums += "$hash  $($file.Name)"
            Write-Host "$hash  $($file.Name)"
          }
          $checksums | Out-File -FilePath "src-tauri/target/release/bundle/SHA256SUMS.txt" -Encoding utf8

      - name: Sign checksums file with Sigstore
        run: |
          cosign sign-blob --yes --bundle "src-tauri/target/release/bundle/SHA256SUMS.txt.sigstore" "src-tauri/target/release/bundle/SHA256SUMS.txt"

      - name: Upload build artifacts
        id: upload
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: birdo-vpn-windows-installers
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.sigstore
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.sigstore
            src-tauri/target/release/bundle/SHA256SUMS.txt
            src-tauri/target/release/bundle/SHA256SUMS.txt.sigstore
          retention-days: 30

  # ── Job 2: GitHub Release ───────────────────────────────────────────
  # Publishes already-signed artifacts (Authenticode signing happens IN the
  # build job via Tauri's signCommand, so no separate signing job is needed).
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: birdo-vpn-windows-installers
          path: release-files/

      - name: List release files
        shell: bash
        run: |
          # Flatten any nested directories from the artifact upload
          find release-files -type f -exec mv {} release-files/ \; 2>/dev/null || true
          ls -la release-files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          files: release-files/*
          generate_release_notes: true
          draft: true
