name: Build & Sign Windows Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string
  push:
    tags:
      - 'win-v*'

# Minimum permissions — each job declares its own
permissions: {}

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Job 1: Build ────────────────────────────────────────────────────
  # Builds unsigned Tauri installers + Sigstore provenance signatures.
  build:
    runs-on: windows-latest
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
    permissions:
      contents: write
      id-token: write  # Required for Sigstore keyless signing (Fulcio OIDC)
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Rust cache
        uses: Swatinem/rust-cache@401aff9a7a08acb9d27b64936a90db81024cff97 # v2.8.2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      # Download wintun.dll (gitignored — must be fetched at build time)
      - name: Download Wintun
        shell: pwsh
        run: |
          $wintunUrl = "https://www.wintun.net/builds/wintun-0.14.1.zip"
          $zipPath = "$env:RUNNER_TEMP\wintun.zip"
          Invoke-WebRequest -Uri $wintunUrl -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath "$env:RUNNER_TEMP\wintun"
          # Copy to resources/ for Tauri bundling
          New-Item -ItemType Directory -Force -Path "src-tauri/resources"
          Copy-Item "$env:RUNNER_TEMP\wintun\wintun\bin\amd64\wintun.dll" "src-tauri/resources/wintun.dll"
          # Also copy to wintun-extract for build.rs
          New-Item -ItemType Directory -Force -Path "src-tauri/wintun-extract/wintun/bin/amd64"
          Copy-Item "$env:RUNNER_TEMP\wintun\wintun\bin\amd64\wintun.dll" "src-tauri/wintun-extract/wintun/bin/amd64/wintun.dll"
          Write-Host "Wintun DLL ready ($(Get-Item src-tauri/resources/wintun.dll | Select-Object -ExpandProperty Length) bytes)"

      - name: Build Tauri application
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build

      # ── Sigstore keyless signing ──────────────────────────────────────
      # Provenance layer — proves GitHub Actions built this artifact.
      # Each artifact gets a .sigstore bundle (Fulcio cert + Rekor log).
      # Users verify with: cosign verify-blob --bundle <file>.sigstore <file>
      - name: Install Cosign
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0

      - name: Sign NSIS installer with Sigstore
        shell: pwsh
        run: |
          $nsisExe = Get-ChildItem "src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -First 1
          if ($nsisExe) {
            cosign sign-blob --yes --bundle "$($nsisExe.FullName).sigstore" $nsisExe.FullName
            Write-Host "Signed $($nsisExe.Name) → $($nsisExe.Name).sigstore"
          } else {
            Write-Error "NSIS installer not found"
            exit 1
          }

      - name: Sign MSI installer with Sigstore
        shell: pwsh
        run: |
          $msiFile = Get-ChildItem "src-tauri/target/release/bundle/msi/*.msi" | Select-Object -First 1
          if ($msiFile) {
            cosign sign-blob --yes --bundle "$($msiFile.FullName).sigstore" $msiFile.FullName
            Write-Host "Signed $($msiFile.Name) → $($msiFile.Name).sigstore"
          } else {
            Write-Error "MSI installer not found"
            exit 1
          }

      - name: Generate SHA256 checksums
        shell: pwsh
        run: |
          $artifacts = Get-ChildItem "src-tauri/target/release/bundle" -Recurse -Include *.exe, *.msi
          $checksums = @()
          foreach ($file in $artifacts) {
            $hash = (Get-FileHash -Path $file.FullName -Algorithm SHA256).Hash.ToLower()
            $checksums += "$hash  $($file.Name)"
            Write-Host "$hash  $($file.Name)"
          }
          $checksums | Out-File -FilePath "src-tauri/target/release/bundle/SHA256SUMS.txt" -Encoding utf8

      - name: Sign checksums file with Sigstore
        run: |
          cosign sign-blob --yes --bundle "src-tauri/target/release/bundle/SHA256SUMS.txt.sigstore" "src-tauri/target/release/bundle/SHA256SUMS.txt"

      - name: Upload build artifacts
        id: upload
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: birdo-vpn-windows-installers
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.sigstore
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.sigstore
            src-tauri/target/release/bundle/SHA256SUMS.txt
            src-tauri/target/release/bundle/SHA256SUMS.txt.sigstore
          retention-days: 30

  # ── Job 2: Azure Trusted Signing (Authenticode) ──────────────────────
  # Signs NSIS .exe and MSI with Authenticode via Microsoft Azure Trusted Signing.
  # Authentication uses OIDC federation — no client secrets required.
  # Requires the following GitHub secrets/vars:
  #   AZURE_TENANT_ID      — Azure Active Directory tenant ID
  #   AZURE_CLIENT_ID      — App registration (service principal) client ID
  #   AZURE_SUBSCRIPTION_ID — Azure subscription ID (optional, for resource scoping)
  # And the following GitHub variables (not secrets):
  #   AZURE_TRUSTED_SIGNING_ACCOUNT_NAME    — "Birdo"  (existing account in BirdoVPN resource group)
  #   AZURE_TRUSTED_SIGNING_ENDPOINT        — "https://neu.codesigning.azure.net/"
  #   AZURE_TRUSTED_SIGNING_CERT_PROFILE    — "BirdoVPNCertProfile"
  #
  # OIDC Setup:
  # 1. In Azure AD, register an App. Under "Certificates & secrets > Federated credentials",
  #    add a GitHub Actions credential:
  #      Issuer: https://token.actions.githubusercontent.com
  #      Subject: repo:<org>/<repo>:ref:refs/tags/*   (restrict to tag pushes)
  # 2. Grant the app "Code Signing Certificate Profile Signer" role on your
  #    Trusted Signing Account resource in Azure.
  # 3. Set AZURE_TENANT_ID and AZURE_CLIENT_ID as GitHub repository secrets.
  # 4. Set the three AZURE_TRUSTED_SIGNING_* values as GitHub repository variables.
  sign:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    environment: release
    permissions:
      id-token: write   # REQUIRED: Allows OIDC JWT exchange with Azure AD
      actions: read
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: birdo-vpn-windows-installers
          path: artifacts/

      # Log in to Azure using OIDC (no stored client secrets)
      - name: Azure Login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          allow-no-subscriptions: true

      # Sign NSIS EXE + MSI installer in a single pass — files-folder-filter accepts
      # a comma-separated list of extensions. Azure Trusted Signing applies
      # Authenticode signatures to each matching file using the SHA-256 digest and
      # the RFC 3161 timestamp from Microsoft's own timestamping authority.
      - name: Sign Windows installers via Azure Trusted Signing (EXE + MSI)
        uses: azure/trusted-signing-action@48da903ca5e2d362da62c631a42d77c02ec7eadb # v1.2.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          endpoint: ${{ vars.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ vars.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ vars.AZURE_TRUSTED_SIGNING_CERT_PROFILE }}
          files-folder: artifacts
          files-folder-filter: exe,msi
          files-folder-recurse: true
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          exclude-environment-credential: true
          exclude-workload-identity-credential: true
          exclude-managed-identity-credential: true
          exclude-shared-token-cache-credential: true
          exclude-visual-studio-credential: true
          exclude-visual-studio-code-credential: true
          exclude-azure-cli-credential: false   # Azure CLI is authenticated via OIDC login above
          exclude-azure-powershell-credential: true
          exclude-azure-developer-cli-credential: true
          exclude-interactive-browser-credential: true

      - name: Upload signed artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: birdo-vpn-windows-signed
          path: |
            artifacts/**/*.exe
            artifacts/**/*.msi
          retention-days: 30

  # ── Job 3: GitHub Release ───────────────────────────────────────────
  # Publishes signed artifacts (or unsigned if SignPath not yet configured).
  release:
    needs: [build, sign]
    if: always() && needs.build.result == 'success' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Download Sigstore bundles + checksums from unsigned artifacts
      - name: Download unsigned artifacts (Sigstore + checksums)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: birdo-vpn-windows-installers
          path: release-unsigned/

      # Download Azure Trusted Signing artifacts (signed EXE + MSI)
      - name: Download signed artifacts
        if: needs.sign.result == 'success'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: birdo-vpn-windows-signed
          path: release-signed/
        continue-on-error: true

      # Assemble release: prefer Azure-signed installers, fall back to unsigned
      - name: Assemble release files
        shell: bash
        run: |
          mkdir -p release-files

          # Always include Sigstore provenance bundles + checksums
          find release-unsigned -name '*.sigstore' -exec cp {} release-files/ \;
          find release-unsigned -name 'SHA256SUMS*' -exec cp {} release-files/ \;

          if [ -d release-signed ] && find release-signed -name '*.exe' | grep -q .; then
            echo "Using Azure Trusted Signing-signed installers"
            find release-signed -name '*.exe' -exec cp {} release-files/ \;
            find release-signed -name '*.msi' -exec cp {} release-files/ \;
          else
            echo "WARNING: Azure signing failed or unavailable — using unsigned installers"
            find release-unsigned -name '*.exe' -exec cp {} release-files/ \;
            find release-unsigned -name '*.msi' -exec cp {} release-files/ \;
          fi

          echo "Release files:"
          ls -la release-files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          files: release-files/*
          generate_release_notes: true
          draft: true
