name: Build & Sign Windows Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string
  push:
    tags:
      - 'win-v*'

# Minimum permissions — each job declares its own
permissions: {}

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Job 1: Build ────────────────────────────────────────────────────
  # Builds unsigned Tauri installers + Sigstore provenance signatures.
  build:
    runs-on: windows-latest
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
    permissions:
      contents: write
      id-token: write  # Required for Sigstore keyless signing (Fulcio OIDC)
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Rust cache
        uses: Swatinem/rust-cache@401aff9a7a08acb9d27b64936a90db81024cff97 # v2.8.2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      # Download wintun.dll (gitignored — must be fetched at build time)
      - name: Download Wintun
        shell: pwsh
        run: |
          $wintunUrl = "https://www.wintun.net/builds/wintun-0.14.1.zip"
          $zipPath = "$env:RUNNER_TEMP\wintun.zip"
          Invoke-WebRequest -Uri $wintunUrl -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath "$env:RUNNER_TEMP\wintun"
          # Copy to resources/ for Tauri bundling
          New-Item -ItemType Directory -Force -Path "src-tauri/resources"
          Copy-Item "$env:RUNNER_TEMP\wintun\wintun\bin\amd64\wintun.dll" "src-tauri/resources/wintun.dll"
          # Also copy to wintun-extract for build.rs
          New-Item -ItemType Directory -Force -Path "src-tauri/wintun-extract/wintun/bin/amd64"
          Copy-Item "$env:RUNNER_TEMP\wintun\wintun\bin\amd64\wintun.dll" "src-tauri/wintun-extract/wintun/bin/amd64/wintun.dll"
          Write-Host "Wintun DLL ready ($(Get-Item src-tauri/resources/wintun.dll | Select-Object -ExpandProperty Length) bytes)"

      - name: Build Tauri application
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build

      # ── Sigstore keyless signing ──────────────────────────────────────
      # Provenance layer — proves GitHub Actions built this artifact.
      # Each artifact gets a .sigstore bundle (Fulcio cert + Rekor log).
      # Users verify with: cosign verify-blob --bundle <file>.sigstore <file>
      - name: Install Cosign
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0

      - name: Sign NSIS installer with Sigstore
        shell: pwsh
        run: |
          $nsisExe = Get-ChildItem "src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -First 1
          if ($nsisExe) {
            cosign sign-blob --yes --bundle "$($nsisExe.FullName).sigstore" $nsisExe.FullName
            Write-Host "Signed $($nsisExe.Name) → $($nsisExe.Name).sigstore"
          } else {
            Write-Error "NSIS installer not found"
            exit 1
          }

      - name: Sign MSI installer with Sigstore
        shell: pwsh
        run: |
          $msiFile = Get-ChildItem "src-tauri/target/release/bundle/msi/*.msi" | Select-Object -First 1
          if ($msiFile) {
            cosign sign-blob --yes --bundle "$($msiFile.FullName).sigstore" $msiFile.FullName
            Write-Host "Signed $($msiFile.Name) → $($msiFile.Name).sigstore"
          } else {
            Write-Error "MSI installer not found"
            exit 1
          }

      - name: Generate SHA256 checksums
        shell: pwsh
        run: |
          $artifacts = Get-ChildItem "src-tauri/target/release/bundle" -Recurse -Include *.exe, *.msi
          $checksums = @()
          foreach ($file in $artifacts) {
            $hash = (Get-FileHash -Path $file.FullName -Algorithm SHA256).Hash.ToLower()
            $checksums += "$hash  $($file.Name)"
            Write-Host "$hash  $($file.Name)"
          }
          $checksums | Out-File -FilePath "src-tauri/target/release/bundle/SHA256SUMS.txt" -Encoding utf8

      - name: Sign checksums file with Sigstore
        run: |
          cosign sign-blob --yes --bundle "src-tauri/target/release/bundle/SHA256SUMS.txt.sigstore" "src-tauri/target/release/bundle/SHA256SUMS.txt"

      - name: Upload build artifacts
        id: upload
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: birdo-vpn-windows-installers
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.sigstore
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.sigstore
            src-tauri/target/release/bundle/SHA256SUMS.txt
            src-tauri/target/release/bundle/SHA256SUMS.txt.sigstore
          retention-days: 30

  # ── Job 2: SignPath Authenticode Signing ─────────────────────────────
  # Submits build artifacts to SignPath Foundation for Authenticode signing.
  # This gives "Publisher: SignPath Foundation" (trusted) in SmartScreen/UAC.
  # Uses origin verification — SignPath verifies the build came from this repo.
  # Skipped if SIGNPATH_ORGANIZATION_ID is not set (before Foundation approval).
  sign:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      actions: read       # To verify the build artifact origin
      id-token: write     # For SignPath origin verification (OIDC)
    steps:
      - name: Submit NSIS installer to SignPath
        if: ${{ vars.SIGNPATH_ORGANIZATION_ID != '' }}
        uses: signpath/github-action-submit-signing-request@v1.1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: BirdoVPN
          signing-policy-slug: BirdoVPN
          artifact-configuration-slug: initial
          github-artifact-id: ${{ needs.build.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed-nsis/

      - name: Upload signed NSIS installer
        if: ${{ vars.SIGNPATH_ORGANIZATION_ID != '' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: birdo-vpn-windows-signed-nsis
          path: signed-nsis/
          retention-days: 30

  # ── Job 3: GitHub Release ───────────────────────────────────────────
  # Publishes signed artifacts (or unsigned if SignPath not yet configured).
  release:
    needs: [build, sign]
    if: always() && needs.build.result == 'success' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Always download unsigned artifacts (for Sigstore bundles + checksums)
      - name: Download unsigned artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: birdo-vpn-windows-installers
          path: release-unsigned/

      # Download signed artifact if SignPath signing succeeded
      - name: Download signed NSIS
        if: needs.sign.result == 'success'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: birdo-vpn-windows-signed-nsis
          path: release-signed/
        continue-on-error: true

      # Assemble release: prefer signed installer, fall back to unsigned
      - name: Assemble release files
        shell: bash
        run: |
          mkdir -p release-files
          # Copy Sigstore bundles and checksums (always from unsigned)
          find release-unsigned -name '*.sigstore' -exec cp {} release-files/ \;
          find release-unsigned -name 'SHA256SUMS*' -exec cp {} release-files/ \;
          # Use signed EXE if available, otherwise unsigned
          if [ -d release-signed ] && find release-signed -name '*.exe' | grep -q .; then
            find release-signed -name '*.exe' -exec cp {} release-files/ \;
            echo "Using SignPath-signed EXE"
          else
            find release-unsigned -name '*.exe' -exec cp {} release-files/ \;
            echo "Using unsigned EXE"
          fi
          # MSI is not yet SignPath-signed (single PE config)
          find release-unsigned -name '*.msi' -exec cp {} release-files/ \;
          echo "Release files:"
          ls -la release-files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          files: release-files/*
          generate_release_notes: true
          draft: true
