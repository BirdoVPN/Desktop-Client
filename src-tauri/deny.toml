# cargo-deny configuration for Birdo VPN client (schema v2; cargo-deny >=0.18)
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# In v2 vulnerabilities are always denied; this lists advisories we've reviewed
# and consciously accept (with justification + a review-by date).
ignore = [
    # RUSTSEC-2024-0344: boringtun timing side-channel in curve25519-dalek.
    # No practical exploit for VPN traffic — it needs a co-located attacker with
    # microsecond timing, while our WireGuard handshake has a 500ms minimum
    # (CRYPTO-001 in wireguard_new.rs) and handshake_with_retry() masks timing
    # via exponential backoff + constant-time handshake padding in our code layer.
    # Tracked: https://github.com/cloudflare/boringtun/issues/396
    # Review-by: 2026-07-01 — escalate to crate replacement if still unpatched.
    "RUSTSEC-2024-0344",

    # ── TRACKED FOR REMEDIATION AT THE rustc 1.83 -> 1.85 TOOLCHAIN BUMP ──────
    # The real fix for the entries below is `cargo update` to pull patched
    # rustls/webpki/aes, but several of those releases require edition2024
    # (rustc >= 1.85) — the same toolchain bump that unblocks the Linux build.
    # They are acknowledged + justified here so the weekly scan stays green on
    # KNOWN advisories while still failing on any NEW one. Re-evaluate and remove
    # each as the deps are bumped. Review-by: 2026-09-01.

    # RUSTSEC-2025-0009: aes may panic when overflow-checking is enabled. The
    # shipped client is a release build (overflow-checks off), so this is a
    # debug-only panic, not a release vulnerability.
    "RUSTSEC-2025-0009",

    # RUSTSEC-2026-0049 / -0098 / -0099 / -0104: rustls/webpki CRL-authority and
    # name-constraint (URI / wildcard) matching + a CRL-parse panic. The client
    # talks only to Birdo's own endpoints and pins the server cert chain by SPKI
    # (see the cert-pin watchdog), so it does not depend on CRL revocation or
    # name-constraint validation of arbitrary third-party CAs. Patch at the dep bump.
    "RUSTSEC-2026-0049",
    "RUSTSEC-2026-0098",
    "RUSTSEC-2026-0099",
    "RUSTSEC-2026-0104",

    # RUSTSEC-2026-0009: DoS via stack exhaustion. The client only parses
    # responses from its own control plane / pinned servers, not arbitrary
    # attacker-controlled input, so exposure is low. Patch at the dep bump.
    "RUSTSEC-2026-0009",
]
# v2: `unmaintained` is a scope enum, not a severity. We gate on vulnerabilities
# (always denied) and yanked crates; unmaintained advisories are not enforced
# (we can't control transitive maintenance), matching the old `unmaintained=warn`.
unmaintained = "none"
yanked = "warn"

[licenses]
# v2 denies any license not in this allow-list by default (the old
# unlicensed/copyleft/allow-osi-fsf-free keys were removed from the schema).
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "BSL-1.0",
    "OpenSSL",
    "CC0-1.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8
# Skip our own first-party crate (license = "Proprietary", publish = false) — it
# isn't a third-party dependency whose license we need to vet.
private = { ignore = true }

# `ring` ships a custom LICENSE that doesn't resolve to a single SPDX id
# (cargo-deny scores it 0.66 < the 0.8 threshold -> "unlicensed"). Clarify it to
# its actual license mix; MIT/ISC/OpenSSL are all allow-listed above. The hash
# matches ring 0.16.20's LICENSE file (from the cargo-deny output).
[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
# Deny known-problematic crates here, e.g. { name = "openssl", version = "*" }.
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
